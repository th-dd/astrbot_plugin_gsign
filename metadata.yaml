name: gsign
display_name: 每日自动签到
desc: 每日凌晨自动在群内签到，支持白名单/黑名单模式
version: v1.0.0
author: Nova
repo: https://github.com/th-dd/astrbot_plugin_gsign
support_mirrors:
  - gh
webui_config:
  - key: enabled
    label: 开启每日签到
    type: bool
    default: false
  - key: mode
    label: 运行模式
    type: select
    options:
      - value: whitelist
        label: 白名单（仅列表群号打卡）
      - value: blacklist
        label: 黑名单（除列表群号外全部打卡）
    default: whitelist
  - key: whitelist
    label: 白名单群号列表
    type: list
    default: []
  - key: blacklist
    label: 黑名单群号列表
    type: list
    default: []
